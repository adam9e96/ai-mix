name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        working-directory: backend/ai-mix-api
        run: chmod +x ./gradlew

      - name: Run backend tests
        working-directory: backend/ai-mix-api
        run: ./gradlew test

  deploy:
    needs: test-backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /srv/docker/ai-mix
            git fetch origin main
            git checkout main
            git restore --staged --worktree -- docker-compose.yml
            git pull --ff-only origin main
            test -f .env
            docker network inspect web > /dev/null
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml ps
            for i in $(seq 1 20); do
              if docker exec portfolio-proxy-nginx wget --quiet --output-document=- http://aimix-nginx/api/v1/health > /dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "AI-MIX health check did not become ready in time"
                docker compose -f docker-compose.prod.yml logs --tail=200 aimix-backend aimix-nginx
                exit 1
              fi
              sleep 3
            done
            curl --fail --silent https://ai-mix.adam9e96.dev/api/v1/health > /dev/null
