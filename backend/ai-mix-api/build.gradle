plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.9'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.aimix'
version = '0.0.1-SNAPSHOT'
description = 'ai-mix backend REST API 서비스'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// MapStruct가 파라미터 이름을 인식할 수 있도록 설정
tasks.withType(JavaCompile) {
    options.compilerArgs += ['-parameters']
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-mail'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    // UUID v7 생성 라이브러리
    implementation 'com.github.f4b6a3:uuid-creator:6.1.1'

    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    runtimeOnly 'org.postgresql:postgresql'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly 'org.projectlombok:lombok' // 테스트 의존성 추가
    testAnnotationProcessor 'org.projectlombok:lombok' // 테스트 의존성 추가
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // JWT 라이브러리 (최신 버전: 0.13.0)
    implementation 'io.jsonwebtoken:jjwt-api:0.13.0'
    implementation 'io.jsonwebtoken:jjwt-impl:0.13.0'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.13.0' // JSON 직렬화(Jackson)

    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    
    // OpenAI 공식 Java SDK
    implementation("com.openai:openai-java:4.8.0")

    // MapStruct (DTO ↔ Entity 매퍼)
    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'
    // Lombok과 MapStruct 통합 (Lombok이 생성한 getter를 MapStruct가 인식하도록)
    annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

}

tasks.named('test') {
    useJUnitPlatform()
    // Mockito 경고 해결을 위한 설정
    jvmArgs = [
        '-XX:+EnableDynamicAgentLoading'
    ]
}
