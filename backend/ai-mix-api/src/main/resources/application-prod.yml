# ============================================
# 프로덕션 환경 설정 (Docker Compose / VM 배포용)
# ============================================
# 모든 값은 Docker Compose 환경변수에서 주입됨
# spring.profiles.active=prod 로 활성화

spring:
  # PostgreSQL (Docker Compose 서비스)
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: AiMixHikariPool
      auto-commit: false

  # Redis (Docker Compose 서비스)
  data:
    redis:
      url: ${REDIS_URL}

  # JPA 프로덕션 설정
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        type:
          prefer_native_enum_types: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
    open-in-view: false

  # 이메일 설정
  mail:
    host: smtp.gmail.com
    port: 587
    username: aimix9e96@gmail.com
    password: ${AI_MIX_GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# 서버 설정
server:
  port: ${PORT:8081}
  address: 0.0.0.0

# 로깅 (프로덕션 레벨)
logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.aimix_aimixapi: INFO

# 파일 업로드
file:
  upload:
    dir: ${AIMIX_UPLOAD_DIR:/app/uploads}

# JWT 설정
jwt:
  secret-key: ${AIMIX_JWT_SECRET_KEY}
  access-token-expiration: ${AIMIX_JWT_ACCESS_EXPIRE:1800000}
  refresh-token-expiration: ${AIMIX_JWT_REFRESH_EXPIRE:604800000}
  issuer: ${AIMIX_JWT_ISSUER:ai-mix-api}

# 쿠키 설정 (프로덕션: HTTPS 전용)
app:
  cookie:
    secure: ${APP_COOKIE_SECURE:true}
    same-site: ${APP_COOKIE_SAME_SITE:None}

# CORS 설정 (Cloudflare Tunnel / VM 배포 도메인)
# 쉼표로 구분하여 여러 도메인 추가 가능
# 예: https://ai-mix.adam9e96.dev,https://www.custom-domain.com
app.cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# API 키 암호화
api-key:
  encryption:
    key: ${API_KEY_ENCRYPTION_KEY}
    salt: ${API_KEY_ENCRYPTION_SALT}
