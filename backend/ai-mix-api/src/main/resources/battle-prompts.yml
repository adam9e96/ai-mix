# Battle 서비스 프롬프트 설정
battle:
  # 배틀 기본 설정
  # 정답으로 인정되는 최소 점수 (0 ~ 100)
  correct-score-threshold: 80
  # 승리 판정 기준 정답률 (%)
  win-rate-threshold: 80.0
  # 무승부 판정 기준 정답률 (%)
  draw-rate-threshold: 50.0
  # 기본 문제 생성 개수
  default-question-count: 3
  # 문제 생성 시 최대 토큰 수
  question-generation-max-tokens: 2000
  # 문제 생성 시 Temperature
  question-generation-temperature: 0.7
  
  # 문제 생성 프롬프트
  question-generation:
    # 문제 생성 시스템 메시지 템플릿
    # %s: 질문 타입 설명 (객관식/주관식)
    # %s: JSON 포맷 예시
    # %s: 타입별 요구사항
    system-message-template: |
      당신은 학습 문제 생성 전문가입니다. 주어진 대화 내용을 분석하여 %s 학습 문제를 생성하는 것이 당신의 역할입니다.

      다음 JSON 형식으로 응답해주세요:
      %s

      기본 요구사항:
      1. 3~5개의 문제를 생성해주세요.
      2. 문제는 대화 내용에서 다룬 주요 개념이나 내용을 바탕으로 만들어주세요.
      %s
      4. 각 문제에 적절한 난이도를 부여해주세요:
         - EASY: 기본 개념, 단순한 사실 확인
         - MEDIUM: 개념 이해 및 적용
         - HARD: 심화 개념, 종합적 사고 필요
      5. 난이도는 문제의 복잡도와 깊이를 고려하여 결정해주세요.
      6. 반드시 유효한 JSON 형식으로만 응답해주세요. (마크다운 코드 블록 없이 순수 JSON만)

      문제 품질 보장 사항:
      - 문제는 대화 내용을 정확히 반영해야 하며, 대화에 없는 내용으로 문제를 만들지 마세요.
      - 정답은 반드시 대화 내용에서 명확히 확인 가능한 사실이어야 합니다.
      - 문제가 모호하거나 여러 해석이 가능한 경우, 더 명확하게 수정해주세요.
      - 문제 생성 후 각 문제의 정답이 대화 내용과 일치하는지 반드시 검증해주세요.
    
    # 객관식 JSON 포맷 예시
    objective-json-format: |
      {
        "questions": [
          {
            "questionText": "문제 내용",
            "correctAnswer": "정답 (반드시 '1', '2', '3', '4' 중 하나의 숫자로 작성)",
            "difficulty": "EASY" 또는 "MEDIUM" 또는 "HARD",
            "questionType": "OBJECTIVE",
            "choices": ["선택지1", "선택지2", "선택지3", "선택지4"]
          }
        ]
      }
    
    # 주관식 JSON 포맷 예시
    subjective-json-format: |
      {
        "questions": [
          {
            "questionText": "문제 내용",
            "correctAnswer": "정답",
            "difficulty": "EASY" 또는 "MEDIUM" 또는 "HARD",
            "questionType": "SUBJECTIVE",
            "choices": null
          }
        ]
      }
    
    # 객관식 문제 생성 요구사항
    objective-requirements: |
      3. 객관식 문제 생성 시 다음을 준수해주세요:
         - 반드시 4개의 선택지를 제공해주세요.
         - 선택지는 명확하고 구분이 잘 되어야 하며, 모두 타당해야 합니다.
         - 정답(correctAnswer)은 반드시 '1', '2', '3', '4' 중 하나의 숫자 문자열로 작성해주세요.
           (예: "1", "2", "3", "4" - 따옴표 포함 문자열)
         - 정답이 명확히 하나여야 하며, 모호한 경우 문제를 수정해주세요.
    
    # 주관식 문제 생성 요구사항
    subjective-requirements: |
      3. 주관식 문제 생성 시 다음을 준수해주세요:
         - 정답(correctAnswer)은 명확하고 구체적인 답안을 작성해주세요.
         - 정답이 여러 형태로 표현 가능한 경우, 가장 일반적인 형태로 작성해주세요.
  
  # 채점 프롬프트
  scoring:
    # 주관식 채점 프롬프트
    # %s: 문제, %s: 정답, %s: 사용자 답변
    subjective-prompt: |
      다음 주관식 문제에 대한 사용자 답변을 채점해주세요.

      문제: %s
      정답: %s
      사용자 답변: %s

      다음 JSON 형식으로 응답해주세요:
      {
        "score": 0-100 사이의 점수,
        "feedback": "채점 피드백 (한국어로 작성, 구체적이고 도움이 되는 피드백)",
        "isCorrect": true 또는 false
      }

      채점 기준:
      1. 정확도: 정답과 얼마나 일치하는가 (0-50점)
      2. 완성도: 답변이 얼마나 완전한가 (0-30점)
      3. 이해도: 문제를 제대로 이해했는가 (0-20점)

      중요: 문제 자체의 정확성 검토
      - 사용자 답변이 정답과 다르더라도, 사용자 답변이 사실상 맞는 경우가 있을 수 있습니다.
      - 문제의 정답이 잘못되었거나 모호한 경우, 사용자 답변을 더 관대하게 평가해주세요.
      - 사용자 답변이 논리적으로 타당하고 사실에 부합한다면, 문제의 정답과 다르더라도 부분 점수를 부여해주세요.
      - 문제 자체에 오류가 있다고 판단되면, 피드백에 이를 명시하고 사용자 답변을 공정하게 평가해주세요.

      주의사항:
      - 부분 점수도 가능합니다 (예: 70점, 85점)
      - 피드백은 구체적이고 학습에 도움이 되도록 작성해주세요
      - 틀렸다면 왜 틀렸는지, 맞았다면 잘한 점을 알려주세요
      - 문제가 잘못되었거나 모호한 경우, 피드백에 이를 명시해주세요
      - 반드시 유효한 JSON 형식으로만 응답해주세요
  
  # 평가 메시지
  evaluation:
    # 등급별 설명
    grade-descriptions:
      S: "완벽합니다! 최고 수준의 이해도를 보여주셨어요! 🏆"
      A+: "훌륭합니다! 매우 높은 수준의 이해도를 보여주셨어요! 🌟"
      A: "훌륭합니다! 매우 높은 수준의 이해도를 보여주셨어요! 🌟"
      B+: "잘하셨습니다! 좋은 수준의 이해도를 보여주셨어요! 👍"
      B: "잘하셨습니다! 좋은 수준의 이해도를 보여주셨어요! 👍"
      C+: "괜찮습니다! 기본적인 이해도를 갖추셨어요! 💪"
      C: "괜찮습니다! 기본적인 이해도를 갖추셨어요! 💪"
      D: "아쉽습니다! 조금 더 학습이 필요해요! 📚"
      F: "많은 연습이 필요합니다! 기초부터 다시 시작해보세요! 💡"
    
    # 평가 코멘트
    comment-high: "매우 우수한 성적을 거두셨습니다! "
    comment-good: "좋은 성적을 거두셨습니다! "
    comment-fair: "준수한 성적을 거두셨습니다! "
    comment-low: "더 많은 학습이 필요합니다. "
    comment-format: "평균 %.1f점, 정답률 %.1f%%를 기록하셨어요."
    
    # 추천 메시지
    recommendation-high: "최고 난이도인 S 레벨에 도전해보세요!"
    recommendation-medium: "더 높은 난이도인 A 또는 S 레벨에 도전해보세요!"
    recommendation-perfect: "완벽합니다! 다른 주제로 도전해보세요!"
    recommendation-next-level: "현재 %s 레벨을 더 연습한 후 다음 단계로 올라가세요!"
    recommendation-basic: "기초부터 차근차근 다시 학습하는 것을 추천드립니다. 틀린 문제를 복습해보세요!"