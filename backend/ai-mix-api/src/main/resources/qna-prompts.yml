# QNA 서비스 프롬프트 설정
qna:
  # QNA 기본 설정
  # 질문 목록 본문 미리보기 최대 길이 (자)
  body-preview-max-length: 50
  # 본문 미리보기 생략 표시
  body-preview-ellipsis: "..."
  
  # GPT 답변 생성 프롬프트
  gpt-prompt:
    # 프롬프트 시작 문구
    introduction: "다음 질문에 대해 전문적이고 도움이 되는 답변을 작성해주세요.\n\n"
    
    # 질문 제목 라벨
    question-title-label: "질문 제목: "
    
    # 질문 내용 라벨
    question-body-label: "질문 내용:\n"
    
    # 기존 답변 참고 문구
    existing-answers-label: "기존 답변들 (참고용):\n"
    
    # 기존 답변 참고 후 지시사항
    existing-answers-instruction: "위 답변들을 참고하되, 더 나은 답변을 제공해주세요.\n\n"
    
    # 답변 작성 가이드라인
    guidelines: |
      답변 작성 시 다음 사항을 준수해주세요:
      1. 정확하고 전문적인 정보를 제공하세요.
      2. 구체적인 예시나 코드가 있으면 포함해주세요.
      3. 이해하기 쉽고 명확하게 작성해주세요.
      4. 불필요한 서론이나 결론 없이 핵심 내용에 집중해주세요.
      5. 한국어로 작성해주세요.
    
    # 마크다운 형식 지시사항
    markdown-format: |
      답변 형식:
      - 마크다운 형식을 사용해주세요.
      - 코드가 있으면 ```언어명 형식의 코드 블록으로 작성해주세요.
      - 중요한 내용은 **굵게** 또는 *기울임*으로 강조해주세요.
      - 목록은 번호 목록(1. 2. 3.) 또는 불릿 목록(-)을 사용해주세요.
      - 단락 구분은 빈 줄로 해주세요.
    
    # 답변 시작 라벨
    answer-label: "답변:"
  
  # 태그 생성 프롬프트
  tag-prompt:
    introduction: "다음 QnA 게시글의 제목과 내용을 분석하여 적절한 태그를 추천해주세요.\n\n"
    title-label: "제목: "
    body-label: "내용: "
    conditions: |
      다음 조건을 만족하는 태그를 추천해주세요:
      1. 게시글의 주제와 내용을 잘 나타내는 태그
      2. 기술적인 용어나 개념을 포함하는 경우 해당 용어를 태그로 사용
      3. 태그는 3~5개 정도로 제한
      4. 각 태그는 한 단어 또는 짧은 구문으로 구성 (최대 20자)
      5. 태그는 한국어 또는 영어로 작성 가능
    response-format: |
      응답 형식은 반드시 다음 JSON 형식으로 작성해주세요:
      {
        "tags": ["태그1", "태그2", "태그3"]
      }
    instruction: "JSON 형식만 응답하고 다른 설명은 포함하지 마세요."
  
  # 배틀 데이터 수집 프롬프트
  battle-data-prompt:
    question-title-label: "질문 제목: "
    question-body-label: "질문 내용: "
    selected-user-answer-label: "선택된 사용자 답변:\n"
    accepted-label: " (채택됨)"
    score-format: " (점수: %d, 추천: %d)"
    user-answer-supplement-instruction: |
      ※ 중요: 위 사용자 답변은 채택되었거나 추천이 많은 답변이지만, 내용이 부족하거나 불완전할 수 있습니다. 아래 GPT 답변을 참고하여 사용자 답변의 부족한 부분을 보완하고, 더 풍부하고 정확한 정보를 바탕으로 문제를 생성해주세요.
    gpt-answer-label: "GPT 답변 (참고 및 보완용):\n"