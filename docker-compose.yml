name: ai-mix-prod

services:
  postgres:
    image: postgres:latest
    container_name: aimix-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - aimix-pgdata:/var/lib/postgresql
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: aimix-redis
    ports:
      - "6379:6379"
    volumes:
      - aimix-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/ai-mix-api
      dockerfile: Dockerfile
    container_name: aimix-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8081
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      AIMIX_UPLOAD_DIR: /app/uploads
      AIMIX_JWT_SECRET_KEY: ${AIMIX_JWT_SECRET_KEY}
      AIMIX_JWT_ISSUER: ${AIMIX_JWT_ISSUER}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}
      AI_MIX_GMAIL_APP_PASSWORD: ${AI_MIX_GMAIL_APP_PASSWORD}
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      API_KEY_ENCRYPTION_SALT: ${API_KEY_ENCRYPTION_SALT}
    volumes:
      - aimix-uploads:/app/uploads

  nginx:
    build:
      context: ./frontend/ai-mix
      dockerfile: Dockerfile
    container_name: aimix-nginx
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  aimix-pgdata:
  aimix-redis-data:
  aimix-uploads:
